<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" preserveAspectRatio="none" fill="none">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#d4b57a"/>
      <stop offset="40%" stop-color="#c5a059"/>
      <stop offset="70%" stop-color="#e8d4a8"/>
      <stop offset="100%" stop-color="#c5a059"/>
    </linearGradient>
    <linearGradient id="goldGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#c5a059"/>
      <stop offset="50%" stop-color="#e8d4a8"/>
      <stop offset="100%" stop-color="#c5a059"/>
    </linearGradient>

    <!-- Pequeña rosa reutilizable -->
    <g id="rosa">
      <circle cx="0" cy="0" r="9" fill="url(#goldGrad)"/>
      <path d="M -6 -3 Q 0 -8 6 -3 Q 3 2 0 0 Q -3 2 -6 -3 Z" fill="#a8884a" opacity="0.6"/>
      <path d="M 0 -6 Q 3 -3 0 0 Q -3 -3 0 -6 Z" fill="#fff" opacity="0.35"/>
    </g>

    <!-- Hoja reutilizable -->
    <g id="hoja">
      <path d="M 0 0 Q 8 -4 14 0 Q 8 4 0 0 Z" fill="url(#goldGrad)" opacity="0.85"/>
      <path d="M 2 0 Q 7 -1 12 0" stroke="#8a6d38" stroke-width="0.6" fill="none" opacity="0.5"/>
    </g>

    <!-- ESQUINA ornamental -->
    <g id="corner">
      <!-- línea principal en L -->
      <path d="M 10 100 Q 10 20 90 10 L 130 10" stroke="url(#goldGrad)" stroke-width="2.2" fill="none" stroke-linecap="round"/>
      <path d="M 16 100 Q 16 25 95 16" stroke="url(#goldGrad)" stroke-width="1" fill="none" opacity="0.6"/>

      <!-- rizo decorativo esquina interior -->
      <path d="M 30 30 Q 45 15 65 22 Q 55 40 35 42 Q 28 35 30 30 Z" fill="url(#goldGrad)" opacity="0.7"/>
      <path d="M 22 22 Q 35 10 52 14" stroke="url(#goldGrad)" stroke-width="1.3" fill="none"/>

      <!-- Vástago con hojas a lo largo del borde superior -->
      <path d="M 95 10 Q 140 6 180 14 Q 215 22 250 14" stroke="url(#goldGrad)" stroke-width="1.4" fill="none"/>
      <use href="#hoja" transform="translate(120,9) rotate(-20)"/>
      <use href="#hoja" transform="translate(155,12) rotate(15)"/>
      <use href="#hoja" transform="translate(200,16) rotate(-10)"/>

      <!-- Vástago con hojas a lo largo del borde izquierdo -->
      <path d="M 10 100 Q 6 140 14 180 Q 22 215 14 250" stroke="url(#goldGrad)" stroke-width="1.4" fill="none"/>
      <use href="#hoja" transform="translate(9,120) rotate(70)"/>
      <use href="#hoja" transform="translate(12,155) rotate(105)"/>
      <use href="#hoja" transform="translate(16,200) rotate(80)"/>

      <!-- Rosas decorativas -->
      <use href="#rosa" transform="translate(40,40)"/>
      <use href="#rosa" transform="translate(85,18) scale(0.7)"/>
      <use href="#rosa" transform="translate(18,85) scale(0.7)"/>
      <use href="#rosa" transform="translate(140,14) scale(0.6)"/>
      <use href="#rosa" transform="translate(14,140) scale(0.6)"/>

      <!-- pequeños puntos de brillo -->
      <circle cx="70" cy="35" r="1.5" fill="#fff" opacity="0.7"/>
      <circle cx="35" cy="70" r="1.5" fill="#fff" opacity="0.7"/>
    </g>
  </defs>

  <!-- Marco base fino -->
  <rect x="14" y="14" width="572" height="772" fill="none"
        stroke="url(#goldGrad2)" stroke-width="1" opacity="0.55"/>
  <rect x="20" y="20" width="560" height="760" fill="none"
        stroke="url(#goldGrad2)" stroke-width="0.5" opacity="0.3"/>

  <!-- 4 esquinas -->
  <use href="#corner" x="0" y="0"/>
  <use href="#corner" x="600" y="0" transform="translate(600,0) scale(-1,1)"/>
  <use href="#corner" x="0" y="800" transform="translate(0,800) scale(1,-1)"/>
  <use href="#corner" x="600" y="800" transform="translate(600,800) scale(-1,-1)"/>

  <!-- Ornamento centrado superior -->
  <g transform="translate(300,14)">
    <path d="M -40 0 Q -20 -10 0 0 Q 20 -10 40 0" stroke="url(#goldGrad)" stroke-width="1.3" fill="none"/>
    <use href="#rosa" transform="translate(0,-2) scale(0.75)"/>
    <use href="#hoja" transform="translate(-22,0) rotate(-15)"/>
    <use href="#hoja" transform="translate(22,0) rotate(195)"/>
  </g>

  <!-- Ornamento centrado inferior -->
  <g transform="translate(300,786)">
    <path d="M -40 0 Q -20 10 0 0 Q 20 10 40 0" stroke="url(#goldGrad)" stroke-width="1.3" fill="none"/>
    <use href="#rosa" transform="translate(0,2) scale(0.75)"/>
    <use href="#hoja" transform="translate(-22,0) rotate(15)"/>
    <use href="#hoja" transform="translate(22,0) rotate(-195)"/>
  </g>
</svg>
